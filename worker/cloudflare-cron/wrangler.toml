name = "lending-terminal-cron"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Schedules. Each cron string here must have a matching entry in
# CRON_JOBS in src/index.ts so the worker knows which endpoint to hit.
#
# Adding a new job? Add the cron + endpoint here AND in CRON_JOBS, then
# `wrangler deploy`.
[triggers]
crons = ["0 1 * * *"]

# Production origin — the canonical Vercel URL for the Next.js app.
# Endpoint paths are appended by the worker. If the domain ever changes,
# update here and re-run `wrangler deploy`, or override per-environment
# via `wrangler secret put BASE_URL`.
[vars]
BASE_URL = "https://lending-intelligence-terminal.vercel.app"

# Observability — lightweight, free tier friendly.
[observability]
enabled = true
