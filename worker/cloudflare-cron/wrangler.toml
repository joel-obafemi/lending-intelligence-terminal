name = "lending-terminal-cron"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Schedules. Each cron string here must have a matching entry in
# CRON_JOBS in src/index.ts so the worker knows which endpoint to hit.
#
# Adding a new job? Add the cron + endpoint here AND in CRON_JOBS, then
# `wrangler deploy`.
[triggers]
crons = ["0 1 * * *"]

# Production origin. Override with `wrangler secret put BASE_URL` if the
# domain changes. Endpoint paths are appended in the worker.
[vars]
BASE_URL = "https://lending-terminal.datumlabs.xyz"

# Observability — lightweight, free tier friendly.
[observability]
enabled = true
