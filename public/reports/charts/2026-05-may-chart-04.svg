<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" font-family="'Source Serif 4', Georgia, serif">
  <style>
    .axis { fill: #595959; font: 11px 'JetBrains Mono', monospace; }
    .grid { stroke: #B8C9DD; stroke-opacity: 0.4; }
    .ref  { stroke: #595959; stroke-dasharray: 3 4; stroke-opacity: 0.65; }
    .line { stroke: #1F3A5F; stroke-width: 2.2; fill: none; }
    .area { fill: rgba(31, 58, 95, 0.18); }
    .dot  { fill: #C5511A; stroke: #F7F4ED; stroke-width: 2; }
    .callout { fill: #C5511A; font: 600 11px 'JetBrains Mono', monospace; }
    .title { fill: #0E1B2C; font: 600 18px 'Source Serif 4', Georgia, serif; }
    .caption { fill: #595959; font: italic 13px 'Source Serif 4', Georgia, serif; }
    .source { fill: #595959; font: 10px 'JetBrains Mono', monospace; letter-spacing: 0.08em; }
    .sblabel { fill: #595959; font: 10px 'JetBrains Mono', monospace; letter-spacing: 0.12em; }
    .sbvalue-c { fill: #C5511A; font: 600 26px 'Source Serif 4', Georgia, serif; }
    .sbvalue-b { fill: #1F3A5F; font: 600 26px 'Source Serif 4', Georgia, serif; }
    .sidebar { fill: rgba(31, 58, 95, 0.04); stroke: #B8C9DD; }
  </style>
  <rect width="880" height="420" fill="#F7F4ED"/>
  <text class="title" x="48" y="36">Aave V3 USDC interest rate model at May 31, 2026</text>
  <text class="caption" x="48" y="58">Borrow APY by utilization. Reading 97.6% sits 7.6 pp past the 90% kink.</text>
  <!-- Chart area: x 60-600, y 90-360. X = util 0-100, Y = borrow 0-60. Kink at x=60+0.9*(540)=546. -->
  <!-- Grid y: 90,150,210,270,330 = 60,45,30,15,0% -->
  <line class="grid" x1="60" y1="90" x2="600" y2="90"/>
  <line class="grid" x1="60" y1="150" x2="600" y2="150"/>
  <line class="grid" x1="60" y1="210" x2="600" y2="210"/>
  <line class="grid" x1="60" y1="270" x2="600" y2="270"/>
  <line class="grid" x1="60" y1="330" x2="600" y2="330"/>
  <text class="axis" x="52" y="94" text-anchor="end">60%</text>
  <text class="axis" x="52" y="154" text-anchor="end">45%</text>
  <text class="axis" x="52" y="214" text-anchor="end">30%</text>
  <text class="axis" x="52" y="274" text-anchor="end">15%</text>
  <text class="axis" x="52" y="334" text-anchor="end">0%</text>
  <!-- IRM curve: base=0, slope1=8% at 90% kink, slope2=55% at 100%. -->
  <!-- y(0%) = 330, y(90% util, 8%) = 330 - 8*4 = 298. y(100%, 55%) = 330 - 55*4 = 110. -->
  <path class="area" d="M 60 330 L 546 298 L 600 110 L 600 360 L 60 360 Z"/>
  <path class="line" d="M 60 330 L 546 298 L 600 110"/>
  <!-- Kink reference line -->
  <line class="ref" x1="546" y1="90" x2="546" y2="330"/>
  <text class="axis" x="546" y="80" text-anchor="middle">Kink 90%</text>
  <!-- Current dot: 97.6% util, 10.95% borrow → x = 60 + 0.976*540 = 587, y = 330 - 10.95*4 = 286 -->
  <circle class="dot" cx="587" cy="286" r="6"/>
  <text class="callout" x="595" y="284">97.6% · 10.95%</text>
  <!-- X labels -->
  <text class="axis" x="60" y="350" text-anchor="middle">0%</text>
  <text class="axis" x="168" y="350" text-anchor="middle">20%</text>
  <text class="axis" x="276" y="350" text-anchor="middle">40%</text>
  <text class="axis" x="384" y="350" text-anchor="middle">60%</text>
  <text class="axis" x="492" y="350" text-anchor="middle">80%</text>
  <text class="axis" x="600" y="350" text-anchor="middle">100%</text>
  <text class="axis" x="330" y="372" text-anchor="middle">UTILIZATION</text>
  <!-- Sidebar -->
  <rect class="sidebar" x="630" y="90" width="210" height="270" rx="4"/>
  <text class="sblabel" x="650" y="120">UTILIZATION</text>
  <text class="sbvalue-c" x="650" y="150">97.6%</text>
  <text class="sblabel" x="650" y="186">SUPPLY APY</text>
  <text class="sbvalue-b" x="650" y="216">9.62%</text>
  <text class="sblabel" x="650" y="252">BORROW APY</text>
  <text class="sbvalue-b" x="650" y="282">10.95%</text>
  <line x1="650" y1="300" x2="820" y2="300" stroke="#B8C9DD"/>
  <text class="sblabel" x="650" y="324">SITTING 7.6 PP PAST</text>
  <text class="sblabel" x="650" y="340">THE KINK</text>
  <text class="source" x="48" y="404">DATUM LABS LENDING TERMINAL</text>
</svg>
