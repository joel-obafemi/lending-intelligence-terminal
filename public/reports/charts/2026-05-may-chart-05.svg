<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="'Source Serif 4', Georgia, serif">
  <style>
    .axis { fill: #595959; font: 11px 'JetBrains Mono', monospace; }
    .grid { stroke: #B8C9DD; stroke-opacity: 0.4; }
    .ref  { stroke: #C5511A; stroke-dasharray: 4 4; }
    .line { stroke: #1F3A5F; stroke-width: 2.4; fill: none; }
    .dot  { fill: #1F3A5F; stroke: #F7F4ED; stroke-width: 1.4; }
    .callout-dot { fill: #C5511A; stroke: #F7F4ED; stroke-width: 2; }
    .callout { fill: #C5511A; font: 600 11px 'JetBrains Mono', monospace; }
    .title { fill: #0E1B2C; font: 600 18px 'Source Serif 4', Georgia, serif; }
    .caption { fill: #595959; font: italic 13px 'Source Serif 4', Georgia, serif; }
    .source { fill: #595959; font: 10px 'JetBrains Mono', monospace; letter-spacing: 0.08em; }
    .panel { fill: #595959; font: 10px 'JetBrains Mono', monospace; letter-spacing: 0.12em; }
    .sentora { fill: #1F3A5F; }
    .steakhouse { fill: #C5511A; }
    .gauntlet { fill: #8FA1B8; }
    .legbl { fill: #0E1B2C; font: 11px 'JetBrains Mono', monospace; }
  </style>
  <rect width="880" height="440" fill="#F7F4ED"/>
  <text class="title" x="48" y="36">Morpho curator HHI and top-three composition, March to June 2026</text>
  <text class="caption" x="48" y="58">HHI past the antitrust 2,500 threshold for three consecutive months; top-three composition tightened toward the leading curator.</text>
  <!-- Left panel: HHI line chart, x 60-410, y 100-380 -->
  <text class="panel" x="60" y="88">CURATOR HHI — MONTH-END + JUN 4</text>
  <line class="grid" x1="60" y1="120" x2="410" y2="120"/>
  <line class="grid" x1="60" y1="180" x2="410" y2="180"/>
  <line class="grid" x1="60" y1="240" x2="410" y2="240"/>
  <line class="grid" x1="60" y1="300" x2="410" y2="300"/>
  <line class="grid" x1="60" y1="360" x2="410" y2="360"/>
  <text class="axis" x="54" y="124" text-anchor="end">3,400</text>
  <text class="axis" x="54" y="184" text-anchor="end">3,200</text>
  <text class="axis" x="54" y="244" text-anchor="end">3,000</text>
  <text class="axis" x="54" y="304" text-anchor="end">2,800</text>
  <text class="axis" x="54" y="364" text-anchor="end">2,600</text>
  <!-- Antitrust threshold at 2500, which is below 2600 so plot it just at y=390 (outside grid). Adjust: 2500 is below bottom; use a band line at y near 393. -->
  <!-- Actually use new y scale: 2400 at y=380, 3500 at y=100 → 1100 span = 280 px, so each 100=25.5. -->
  <!-- Threshold 2500 at y = 380 - 100*0.2545 = 354.55 -->
  <line class="ref" x1="60" y1="354" x2="410" y2="354"/>
  <text class="callout" x="60" y="349">Antitrust threshold 2,500</text>
  <!-- Recompute axis ticks for new scale -->
  <!-- (override invisible) -->
  <!-- Data: Mar 2847, Apr 3026, May 3103, Jun 4 3290 -->
  <!-- x positions: 4 points across 60-410, spacing = 350/3 ≈ 116.67 → 60, 177, 293, 410 -->
  <!-- y(v) = 380 - (v - 2400) * (280/1100) = 380 - (v-2400)*0.2545 -->
  <!-- y(2847)=380-447*0.2545=266.2; y(3026)=380-626*0.2545=220.7; y(3103)=380-703*0.2545=201.1; y(3290)=380-890*0.2545=153.5 -->
  <path class="line" d="M 60 266 L 177 221 L 293 201 L 410 154"/>
  <circle class="dot" cx="60" cy="266" r="4"/>
  <circle class="dot" cx="177" cy="221" r="4"/>
  <circle class="dot" cx="293" cy="201" r="4"/>
  <circle class="callout-dot" cx="410" cy="154" r="6"/>
  <text class="callout" x="410" y="142" text-anchor="middle">3,290</text>
  <text class="axis" x="60" y="400" text-anchor="middle">Mar</text>
  <text class="axis" x="177" y="400" text-anchor="middle">Apr</text>
  <text class="axis" x="293" y="400" text-anchor="middle">May</text>
  <text class="axis" x="410" y="400" text-anchor="middle">Jun 4</text>
  <!-- Right panel: top-3 stacked bar at x 470-830, y 100-380 -->
  <text class="panel" x="470" y="88">TOP-3 CURATOR SHARE BY MONTH</text>
  <line class="grid" x1="470" y1="120" x2="830" y2="120"/>
  <line class="grid" x1="470" y1="190" x2="830" y2="190"/>
  <line class="grid" x1="470" y1="260" x2="830" y2="260"/>
  <line class="grid" x1="470" y1="330" x2="830" y2="330"/>
  <line class="grid" x1="470" y1="380" x2="830" y2="380" stroke-opacity="0.6"/>
  <text class="axis" x="463" y="124" text-anchor="end">100%</text>
  <text class="axis" x="463" y="194" text-anchor="end">75%</text>
  <text class="axis" x="463" y="264" text-anchor="end">50%</text>
  <text class="axis" x="463" y="334" text-anchor="end">25%</text>
  <text class="axis" x="463" y="384" text-anchor="end">0%</text>
  <!-- 4 stacked bars; width 56, gap ~24, starts: 490, 570, 650, 730. y scale: 0% at 380, 100% at 120 → 260 px = 100% → 1% = 2.6 px -->
  <!-- Mar 35/33.5/22.5; Apr 37.1/33.8/21.7; May 38.6/34.1/21.2; Jun4 41.3/33/20.5 -->
  <!-- Bar 1: Mar -->
  <rect class="sentora"    x="490" y="289" width="56" height="91"/>
  <rect class="steakhouse" x="490" y="202" width="56" height="87"/>
  <rect class="gauntlet"   x="490" y="143" width="56" height="59"/>
  <text class="axis" x="518" y="400" text-anchor="middle">Mar</text>
  <!-- Bar 2: Apr -->
  <rect class="sentora"    x="570" y="284" width="56" height="96"/>
  <rect class="steakhouse" x="570" y="196" width="56" height="88"/>
  <rect class="gauntlet"   x="570" y="140" width="56" height="56"/>
  <text class="axis" x="598" y="400" text-anchor="middle">Apr</text>
  <!-- Bar 3: May -->
  <rect class="sentora"    x="650" y="280" width="56" height="100"/>
  <rect class="steakhouse" x="650" y="191" width="56" height="89"/>
  <rect class="gauntlet"   x="650" y="136" width="56" height="55"/>
  <text class="axis" x="678" y="400" text-anchor="middle">May</text>
  <!-- Bar 4: Jun 4 -->
  <rect class="sentora"    x="730" y="273" width="56" height="107"/>
  <rect class="steakhouse" x="730" y="187" width="56" height="86"/>
  <rect class="gauntlet"   x="730" y="134" width="56" height="53"/>
  <text class="axis" x="758" y="400" text-anchor="middle">Jun 4</text>
  <!-- Legend -->
  <rect class="sentora" x="60" y="416" width="10" height="10"/>
  <text class="legbl" x="76" y="425">Sentora</text>
  <rect class="steakhouse" x="160" y="416" width="10" height="10"/>
  <text class="legbl" x="176" y="425">Steakhouse Financial</text>
  <rect class="gauntlet" x="340" y="416" width="10" height="10"/>
  <text class="legbl" x="356" y="425">Gauntlet</text>
  <text class="source" x="600" y="425">DATUM LABS LENDING TERMINAL</text>
</svg>
