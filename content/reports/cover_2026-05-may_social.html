<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>State of DeFi Lending on Ethereum — Social Cover (Issue #002)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    background: #0E1B2C;
    overflow: hidden;
  }

  .card {
    width: 1200px;
    height: 630px;
    margin: 0 auto;
    background: #0E1B2C;
    position: relative;
    overflow: hidden;
    color: #F7F4ED;
    display: flex;
  }

  /* Left content */
  .left {
    flex: 1.4;
    padding: 60px 0 60px 70px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 2;
  }

  .top {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .brand-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .brand-mark {
    width: 8px;
    height: 8px;
    background: #C5511A;
    border-radius: 50%;
  }

  .brand-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #C5511A;
    font-weight: 500;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(247, 244, 237, 0.55);
    font-weight: 500;
  }

  .title {
    font-family: 'Source Serif 4', serif;
    font-size: 56px;
    line-height: 1.0;
    font-weight: 700;
    letter-spacing: -0.015em;
    color: #F7F4ED;
    margin-top: 4px;
  }

  .title .of {
    font-style: italic;
    font-weight: 400;
    color: #B8C9DD;
  }

  .subtitle {
    font-family: 'Source Serif 4', serif;
    font-size: 30px;
    line-height: 1.2;
    font-style: italic;
    font-weight: 400;
    color: #C5511A;
    margin-top: 28px;
  }

  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 24px;
    border-top: 1px solid rgba(247, 244, 237, 0.15);
  }

  .issue {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(247, 244, 237, 0.7);
    font-weight: 500;
  }

  .issue strong {
    color: #F7F4ED;
    font-weight: 600;
  }

  .protocols-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(247, 244, 237, 0.7);
    font-weight: 500;
  }

  /* Right side: chart */
  .right {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .chart-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, rgba(31,58,95,0.4) 0%, rgba(14,27,44,0.0) 100%);
  }

  .chart {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* Annotation badge */
  .annotation {
    position: absolute;
    top: 110px;
    right: 60px;
    background: #C5511A;
    color: #F7F4ED;
    padding: 12px 20px;
    border-radius: 4px;
    z-index: 3;
  }

  .annotation .num {
    font-family: 'Source Serif 4', serif;
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.01em;
  }

  .annotation .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 6px;
    opacity: 0.85;
  }
</style>
</head>
<body>
<div class="card">
  <div class="left">
    <div class="top">
      <div class="brand-row">
        <div class="brand-mark"></div>
        <div class="brand-text">DatumLabs Research</div>
      </div>
      <div class="eyebrow">Monthly Sector Brief · May 2026</div>
      <h1 class="title">State <span class="of">of</span> DeFi Lending<br/>on Ethereum</h1>
      <div class="subtitle">Capital Rotates</div>
    </div>

    <div class="bottom">
      <div class="issue">Issue <strong>№002</strong></div>
      <div class="protocols-line">Aave V3 · SparkLend · Morpho · Fluid · Compound · Euler</div>
    </div>
  </div>

  <div class="right">
    <div class="chart-bg"></div>
    <svg class="chart" viewBox="0 0 500 630" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="fillGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#C5511A" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#C5511A" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <!-- Horizontal grid lines -->
      <g opacity="0.08" stroke="#F7F4ED" stroke-width="1">
        <line x1="0" y1="120" x2="500" y2="120"/>
        <line x1="0" y1="220" x2="500" y2="220"/>
        <line x1="0" y1="320" x2="500" y2="320"/>
        <line x1="0" y1="420" x2="500" y2="420"/>
        <line x1="0" y1="520" x2="500" y2="520"/>
      </g>

      <!-- T-bill parity line at RYS = 0 (y ≈ 290 on a y-axis spanning −180 bps top of pos to +50 bps over the chart band) -->
      <line x1="0" y1="290" x2="500" y2="290" stroke="#B8C9DD" stroke-width="1" stroke-dasharray="4 6" opacity="0.5"/>
      <text x="14" y="282" font-family="JetBrains Mono, monospace" font-size="10" fill="#B8C9DD" letter-spacing="1" opacity="0.7">T-bill parity · 0 bps</text>

      <!-- Real Yield Spread 12-month trajectory: May 2025 to May 2026 -->
      <!-- y mapping: +50 bps → y=140; −180 bps → y=520; 1 bps = 380/230 ≈ 1.65 pixels -->
      <!-- Series: May'25 −55 / Jun −90 / Jul +25 / Aug −20 / Sep +38 / Oct −42 / Nov −61 / Dec −8 / Jan'26 −63 / Feb −151 (trough) / Mar −119 / Apr −34 / May −0.3 (parity) -->
      <!-- x step = 500/12 ≈ 41.7 -->
      <path d="M 0 351 L 42 409 L 83 222 L 125 295 L 167 202 L 208 332 L 250 363 L 292 303 L 333 367 L 375 512 L 417 461 L 458 346 L 500 290"
            fill="none" stroke="#C5511A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Fill below the line down to the parity line -->
      <path d="M 0 351 L 42 409 L 83 222 L 125 295 L 167 202 L 208 332 L 250 363 L 292 303 L 333 367 L 375 512 L 417 461 L 458 346 L 500 290 L 500 290 L 0 290 Z"
            fill="url(#fillGrad)" opacity="0.5"/>

      <!-- May 31 callout: parity reading -->
      <circle cx="500" cy="290" r="6" fill="#C5511A"/>
      <circle cx="500" cy="290" r="11" fill="none" stroke="#C5511A" stroke-width="1.5" opacity="0.4"/>

      <!-- Feb 2026 trough callout -->
      <circle cx="375" cy="512" r="4" fill="#1F3A5F" opacity="0.7"/>
      <text x="370" y="540" font-family="JetBrains Mono, monospace" font-size="9" fill="#B8C9DD" letter-spacing="1" opacity="0.7" text-anchor="end">Feb '26 trough</text>

      <!-- Axis labels -->
      <text x="14" y="610" font-family="JetBrains Mono, monospace" font-size="10" fill="#B8C9DD" letter-spacing="1" opacity="0.5">May '25</text>
      <text x="475" y="610" font-family="JetBrains Mono, monospace" font-size="10" fill="#B8C9DD" letter-spacing="1" opacity="0.5" text-anchor="end">May '26</text>
    </svg>

    <div class="annotation">
      <div class="num">−0.3 bps</div>
      <div class="label">Real Yield Spread · May 31</div>
    </div>
  </div>
</div>
</body>
</html>
